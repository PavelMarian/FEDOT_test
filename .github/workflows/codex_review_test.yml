name: Perform a code review when a pull request is created.
on:
  pull_request:
    types: [opened]
  workflow_dispatch:  # manually launch from GitHub actions

jobs:
  codex:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      final_message: ${{ steps.run_codex.outputs.final-message }}
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event.pull_request.number && format('refs/pull/{0}/merge', github.event.pull_request.number) || github.ref }}

      - name: Pre-fetch base and head refs for the PR
        if: github.event_name == 'pull_request'
        env:
          PR_BASE_REF: ${{ github.event.pull_request.base.ref }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          git fetch --no-tags origin \
            "$PR_BASE_REF" \
            "+refs/pull/$PR_NUMBER/head"

      # If you want Codex to build and run code, install any dependencies that
      # need to be downloaded before the "Run Codex" step because Codex's
      # default sandbox disables network access.

      # - name: Run Codex
      #   id: run_codex
      #   uses: openai/codex-action@v1
      #   with:
      #     openai-api-key: ${{ secrets.OPENAI_API_KEY }}
      #     prompt: |
      #       This is PR #${{ github.event.pull_request.number }} for ${{ github.repository }}.

      #       Review ONLY the changes introduced by the PR, so consider:
      #          git log --oneline ${{ github.event.pull_request.base.sha }}...${{ github.event.pull_request.head.sha }}

      #       Suggest any improvements, potential bugs, or issues.
      #       Be concise and specific in your feedback.

      #       Pull request title and body:
      #       ----
      #       ${{ github.event.pull_request.title }}
      #       ${{ github.event.pull_request.body }}
      - name: Mock Codex response
      id: run_codex
      run: |
        echo "final-message=Mock review: everything looks good" >> $GITHUB_OUTPUT

  post_feedback:
    runs-on: ubuntu-latest
    needs: codex
    if: needs.codex.outputs.final_message != ''
    permissions:
      issues: write
      pull-requests: write
    steps:
      - name: Report Codex feedback
        uses: actions/github-script@v7
        env:
          CODEX_FINAL_MESSAGE: ${{ needs.codex.outputs.final_message }}
        with:
          github-token: ${{ github.token }}
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: process.env.CODEX_FINAL_MESSAGE,
            });
