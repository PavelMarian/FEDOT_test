name: Make a Review (by Codex)
on:
  pull_request:
    branches: [ master ]
    types: [ opened, synchronize, ready_for_review ]
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to review'
        required: true

env:
  PR_NUMBER: ${{ github.event.pull_request.number || inputs.pr_number }}

jobs:
  codex:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      final_message: ${{ steps.run_codex.outputs.final-message }}
      pr_number: ${{ env.PR_NUMBER }}
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ format('refs/pull/{0}/merge', env.PR_NUMBER) }}

      - name: Fetch PR refs
        env:
          PR_NUMBER: ${{ env.PR_NUMBER }}
        run: |
          git fetch --no-tags origin \
            "+refs/pull/$PR_NUMBER/head:refs/remotes/origin/pr/$PR_NUMBER"

      - name: Load PR metadata
        id: pr
        uses: actions/github-script@v7
        env:
          PR_NUMBER: ${{ env.PR_NUMBER }}
        with:
          github-token: ${{ github.token }}
          script: |
            const prNumber = Number(process.env.PR_NUMBER);
      
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
            });
      
            core.setOutput('title', pr.title);
            core.setOutput('body', pr.body || '');
            core.setOutput('base_sha', pr.base.sha);
            core.setOutput('head_sha', pr.head.sha);
            
      - name: Load Codex Review system promt
        id: prompt
        run: |
            PROMPT_FILE=".github/codex/prompts/review_system_prompt.md"
            if [ -f "$PROMPT_FILE" ]; then
              CONTENT=$(cat "$PROMPT_FILE")
              echo "content<<EOF" >> $GITHUB_OUTPUT
              echo "$CONTENT" >> $GITHUB_OUTPUT
              echo "EOF" >> $GITHUB_OUTPUT
            else
              echo "content=" >> $GITHUB_OUTPUT
            fi

      - name: Mock Codex (for fork testing)
        id: run_codex
        run: |
          echo "final-message<<EOF" >> $GITHUB_OUTPUT
      
          echo "🧪 MOCK CODEX REVIEW" >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT
          echo "PR #${{ env.PR_NUMBER }}" >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT
          echo "Summary:" >> $GITHUB_OUTPUT
          echo "- This is a simulated review for testing the workflow." >> $GITHUB_OUTPUT
          echo "- No actual AI analysis was performed." >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT
          echo "Checks:" >> $GITHUB_OUTPUT
          echo "✔ Workflow execution works" >> $GITHUB_OUTPUT
          echo "✔ PR metadata is accessible" >> $GITHUB_OUTPUT
          echo "✔ Comment posting is functional" >> $GITHUB_OUTPUT
      
          echo "EOF" >> $GITHUB_OUTPUT

  post_feedback:
    runs-on: ubuntu-latest
    needs: codex
    if: needs.codex.outputs.final_message != ''
    permissions:
      issues: write
      pull-requests: write
    steps:
      - name: Report Codex feedback
        uses: actions/github-script@v7
        env:
          CODEX_FINAL_MESSAGE: ${{ needs.codex.outputs.final_message }}
          PR_NUMBER: ${{ needs.codex.outputs.pr_number }}
        with:
          github-token: ${{ github.token }}
          script: |
            const prNumber = Number(process.env.PR_NUMBER);
            if (!prNumber) {
              console.log('Not a pull request, skipping post.');
              return;
            }
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body: process.env.CODEX_FINAL_MESSAGE,
            });
